<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Copilot</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        width: 320px;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(145deg, #fffaf2, #f4efe5);
        color: #1f2a30;
      }

      .wrap {
        padding: 14px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 16px;
      }

      p {
        margin: 0;
        font-size: 12px;
        color: #4c5a63;
      }

      .field {
        margin-top: 10px;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #586873;
      }

      select,
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d6dce0;
        border-radius: 8px;
        padding: 8px;
        background: #ffffff;
        color: #1f2a30;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        font-weight: 600;
        cursor: pointer;
      }

      #start {
        background: #0f766e;
        color: #ffffff;
      }

      #stop {
        background: #dbe2e7;
        color: #1f2a30;
      }

      #toggle {
        margin-top: 8px;
        width: 100%;
        background: #1d4ed8;
        color: #ffffff;
      }

      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #42515b;
        min-height: 16px;
      }

      .hint {
        margin-top: 10px;
        padding: 8px;
        border-radius: 8px;
        background: #fff;
        border: 1px solid #ebe2d1;
        font-size: 11px;
        color: #5a4b2f;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Interview Copilot</h1>
      <p>Use only in mock or explicitly consented sessions.</p>

      <div class="field">
        <label for="mode">Mode</label>
        <select id="mode">
          <option value="HR">HR</option>
          <option value="Technical">Technical</option>
          <option value="Startup">Startup</option>
        </select>
      </div>

      <div class="field">
        <label for="apiUrl">API URL</label>
        <input id="apiUrl" type="text" value="http://localhost:8080" />
      </div>

      <div class="row">
        <button id="start" type="button">Start</button>
        <button id="stop" type="button">Stop</button>
      </div>

      <button id="toggle" type="button">Show/Hide Floating Panel</button>
      <div id="status"></div>

      <div class="hint">
        Visible indicator appears while listening. Start/stop is always manual.
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
